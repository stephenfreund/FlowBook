name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JupyterLab (provides jlpm)
        run: python -m pip install "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Lint TypeScript
        run: jlpm run lint:check

      - name: Build TypeScript
        run: jlpm run build:lib

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatchling hatch-nodejs-version hatch-jupyter-builder editables "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Build extension
        run: |
          set -x
          HATCH_BUILD_HOOKS_ENABLE=false pip install -e "." --no-build-isolation
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "flowbook.*OK"
          jupyter server extension list
          jupyter server extension list 2>&1 | grep -ie "flowbook.*OK"

      - name: Run litmus tests
        run: pytest flowbook/kernel/tests/test_litmus.py -v

      - name: Run paper example tests
        run: pytest flowbook/kernel/tests/test_paper_examples.py -v

      - name: Verify flowbook CLI
        run: flowbook -h

  pandas-versions:
    name: Pandas ${{ matrix.pandas.lane }} (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        pandas:
          - lane: min
            spec: 'pandas==2.3.3'
            pip_args: ''
            allow_failure: false
          - lane: v3
            spec: 'pandas>=3,<4'
            pip_args: ''
            allow_failure: false
          - lane: v4
            spec: 'pandas'
            pip_args: '--pre --extra-index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple'
            allow_failure: true
    continue-on-error: ${{ matrix.pandas.allow_failure }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatchling hatch-nodejs-version hatch-jupyter-builder editables "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Build extension
        run: |
          set -x
          HATCH_BUILD_HOOKS_ENABLE=false pip install -e "." --no-build-isolation

      - name: Pin pandas to ${{ matrix.pandas.lane }} (${{ matrix.pandas.spec }})
        run: |
          python -m pip install --force-reinstall ${{ matrix.pandas.pip_args }} '${{ matrix.pandas.spec }}'
          python -c "import pandas; print('pandas', pandas.__version__)"

      - name: Run pandas-relevant tests
        run: |
          pytest -v \
            flowbook/kernel_support/tests/test_column_tracking.py \
            flowbook/kernel_support/tests/test_column_tracking_methods.py \
            flowbook/kernel_support/tests/test_column_tracking_performance.py \
            flowbook/kernel_support/tests/test_column_tracking_setitem_reads.py \
            flowbook/kernel_support/tests/test_column_provenance.py \
            flowbook/kernel_support/tests/test_chained_assignment_error.py \
            flowbook/kernel_support/tests/test_memory_checkpoint.py \
            flowbook/kernel_support/tests/test_memory_checkpoint_comprehensive.py \
            flowbook/kernel_support/tests/test_memory_checkpoint_edge_cases.py \
            flowbook/kernel_support/tests/test_tracking.py \
            flowbook/kernel_support/tests/test_tracking_structural.py \
            flowbook/kernel_support/tests/test_diff_structural.py \
            flowbook/kernel_support/tests/test_diff_float_tolerance.py \
            flowbook/kernel/tests/test_litmus.py \
            flowbook/kernel/tests/test_paper_examples.py
