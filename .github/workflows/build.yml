name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatchling hatch-nodejs-version hatch-jupyter-builder editables "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Lint TypeScript
        run: jlpm run lint:check

      - name: Build TypeScript
        run: jlpm run build:lib

      - name: Build extension
        run: |
          set -x
          pip install -e "." --no-build-isolation
          python -m pip install -e "." --no-build-isolation
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "flowbook.*OK"
          jupyter server extension list
          jupyter server extension list 2>&1 | grep -ie "flowbook.*OK"

      - name: Run Python tests
        run: pytest flowbook/ -v --ignore=flowbook/labextension
