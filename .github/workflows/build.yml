name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Lint TypeScript
        run: jlpm run lint:check

      - name: Build TypeScript
        run: jlpm run build:lib

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatchling hatch-nodejs-version hatch-jupyter-builder editables "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Build extension
        run: |
          set -x
          HATCH_BUILD_HOOKS_ENABLE=false pip install -e "." --no-build-isolation
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "flowbook.*OK"
          jupyter server extension list
          jupyter server extension list 2>&1 | grep -ie "flowbook.*OK"

      - name: Run litmus tests
        run: pytest flowbook/kernel/tests/test_litmus.py -v

      - name: Run paper example tests
        run: pytest flowbook/kernel/tests/test_paper_examples.py -v

      - name: Verify flowbook CLI
        run: flowbook -h
