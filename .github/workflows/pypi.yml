name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish flowbook-python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling hatch-nodejs-version hatch-jupyter-builder "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Build labextension
        run: jlpm run build:prod

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
