name: Release to PyPI

on:
  release:
    types: [created]  # Trigger when a new release is created in GitHub
  workflow_dispatch:  # Allow manual triggering for testing

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling hatch-nodejs-version hatch-jupyter-builder editables "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        run: jlpm install --no-immutable

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Using trusted publishing (no token needed if configured in PyPI)

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: dist/*
