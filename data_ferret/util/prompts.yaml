# DataFerret Prompts
# This file contains all the prompts used by DataFerret for code inspection and optimization

cell_inspection_instructions: |
  You are an expert at optimizing code.
  You will be asked to analyze the optimization potential of a code cell.
  Estimate the performance gains from further optimizing this code using the scale low (0) to high (5).
  Code that does not take much time to run should get a low score.
  You cannot change the hardware or the environment.
  The effects of the code must be the same.

  For cells with potential >= 4, provide an optimization_plan as a list of OptimizationStep objects.
  Each OptimizationStep must have:
  - target_cell_id: The ID of the cell that needs to be modified (this may be the current cell or another cell with a function definition)
  - function_name: The name of the top-level function to optimize, or None if the optimization applies to top-level code in the cell
  - description: A clear description of what optimization to apply

  For cells with potential < 4, leave the optimization_plan empty.

cell_inspection_input: |
  The current cell ID is: {cell_id}

  Here is the code cell to optimize:
  ```
  {cell_source}
  ```

  Here is some profile data for the cell, if available:
  ```
  {profile_data}
  ```

  Remember:
  - Use the cell ID "{cell_id}" as the target_cell_id for optimizations to this cell.
  - If optimizations require changes to functions defined in other cells, use those cell IDs instead.
  - Set function_name to the name of the specific function to optimize, or None for top-level code.
  - Examples:
    * Optimizing top-level code in current cell: target_cell_id="{cell_id}", function_name=None
    * Optimizing a function in current cell: target_cell_id="{cell_id}", function_name="my_function"
    * Optimizing a function in another cell: target_cell_id="other_cell_id", function_name="helper_function"

optimization_instructions: |
  You are an expert at optimizing Jupyter notebook code.
  Your task is to optimize the given code cell for improved performance.
  Your response should be valid Python code and nothing else.
  - Vectorize where possible.
  - Keep the same functionality but make it more efficient
  - Use built-in functions and libraries when possible
  - Consider time and space complexity
  - Add type hints if they're missing
  - Keep the code readable and maintainable
  - The optimized code must produce the same output as the original
  - If the code is already optimal, return it as-is
  - Include a brief explanation of the optimizations made

optimization_input: |
  Here is the code before the cell (for context):
  ```python
  {prefix}
  ```

  Here is the code to optimize:
  ```python
  {cell_source}
  ```

  Please provide an optimized version of this code. Include only the optimized code in your response,
  with no additional text or explanation. The code should be ready to run as-is.

cleanup_instructions: |
  You are an expert at improving Jupyter notebook code.
  Your task is to analyze the given code cell and provide:
  1. A description of improvements that can be made (readability and best practices)
  2. A cleaned-up, improved version of the code

  Focus on:
  - Code readability and style
  - Best practices and pythonic patterns
  - Type hints -- add them if they're missing
  - Documentation/comments where helpful
  - Error handling if missing

  The improved code must maintain the same functionality as the original.

cleanup_input: |
  Here is the code before the cell (for context):
  ```python
  {prefix}
  ```

  Here is the code cell to improve:
  ```python
  {cell_source}
  ```
