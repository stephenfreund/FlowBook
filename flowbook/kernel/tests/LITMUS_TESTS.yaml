# =============================================================================
# MOVE OPERATIONS - EXPLICIT FORM
# =============================================================================

  # -------------------------------------------------------------------------
  # MOVE: Move writer forward past readers - marks readers stale (EXPLICIT)
  # -------------------------------------------------------------------------
  # NOTE: When a writer moves forward past its readers, the readers are
  # marked stale (reason depends on which staleness path triggers first).
  - name: "move_writer_forward_explicit"
    description: "Moving a writer forward past its readers marks readers stale"
    cell_order: ["a", "b", "c", "d"]
    operations:
      - type: RUN
        cell: "a"
        pre_namespace: {}
        post_namespace: {}
        reads: []
        writes: []
      - type: RUN
        cell: "b"
        pre_namespace: {}
        post_namespace: {"x": 1}
        reads: []
        writes: ["x"]
      - type: RUN
        cell: "c"
        pre_namespace: {"x": 1}
        post_namespace: {"x": 1, "y": 2}
        reads: ["x"]
        writes: ["y"]
      - type: RUN
        cell: "d"
        pre_namespace: {"x": 1, "y": 2}
        post_namespace: {"x": 1, "y": 2}
        reads: []
        writes: []
      # Move B from pos 1 to pos 3 (after D)
      - type: MOVE
        new_order: ["a", "c", "d", "b"]
    expect:
      status:
        a: clean
        b: clean
        c: stale
        d: clean
      newly_stale: ["c"]

  # -------------------------------------------------------------------------
  # MOVE: Move reader backward before writer - marks reader stale (EXPLICIT)
  # -------------------------------------------------------------------------
  # NOTE: When a reader moves backward before its writer, the reader is
  # marked stale (reason depends on which staleness path triggers first).
  - name: "move_reader_backward_explicit"
    description: "Moving a reader backward before its writer marks it stale"
    cell_order: ["a", "b", "c"]
    operations:
      - type: RUN
        cell: "a"
        pre_namespace: {}
        post_namespace: {"x": 1}
        reads: []
        writes: ["x"]
      - type: RUN
        cell: "b"
        pre_namespace: {"x": 1}
        post_namespace: {"x": 1}
        reads: []
        writes: []
      - type: RUN
        cell: "c"
        pre_namespace: {"x": 1}
        post_namespace: {"x": 1, "y": 2}
        reads: ["x"]
        writes: ["y"]
      # Move C backward before A
      - type: MOVE
        new_order: ["c", "a", "b"]
    expect:
      status:
        a: clean
        b: clean
        c: stale

  # -------------------------------------------------------------------------
  # MOVE: Move independent cell - no effect (EXPLICIT)
  # -------------------------------------------------------------------------
  - name: "move_independent_cell_explicit"
    description: "Moving a cell with no dependencies has no staleness effect"
    cell_order: ["a", "b", "c"]
    operations:
      - type: RUN
        cell: "a"
        pre_namespace: {}
        post_namespace: {"x": 1}
        reads: []
        writes: ["x"]
      - type: RUN
