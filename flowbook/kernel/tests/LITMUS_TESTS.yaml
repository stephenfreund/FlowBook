  # -------------------------------------------------------------------------
  # RUN: Multiple writers and reader - complex execution order (CODE)
  # -------------------------------------------------------------------------
  # Test case: a and b both write x, c reads x
  # Run order: a->c->b->c->a
  - name: "run_multi_writer_reader_code"
    description: "Multiple writers with reader shows forward_stale and skipped_upstream (code-based)"
    cell_order: ["a", "b", "c"]
    cells:
      a: "x = 1"
      b: "x = 2"
      c: "y = x"
    operations:
      # Run a: writes x=1
      - type: RUN
        cell: "a"
        pre_namespace: {}
        post_namespace: {"x": 1}
        code: "x = 1"
      # Run c: reads x from a (skipping b)
      - type: RUN
        cell: "c"
        pre_namespace: {"x": 1}
        post_namespace: {"x": 1, "y": 1}
        code: "y = x"
      # Run b: writes x=2, marks c stale (forward_stale)
      - type: RUN
        cell: "b"
        pre_namespace: {"x": 1, "y": 1}
        post_namespace: {"x": 2, "y": 1}
        code: "x = 2"
      # Run c again: reads x from b
      - type: RUN
        cell: "c"
        pre_namespace: {"x": 2}
        post_namespace: {"x": 2, "y": 2}
        code: "y = x"
      # Run a: writes x=1, c reads from b but now x comes from a (skipped_upstream)
      - type: RUN
        cell: "a"
        pre_namespace: {"x": 2, "y": 2}
        post_namespace: {"x": 1, "y": 2}
        code: "x = 1"
    expect:
      status:
        a: clean
        b: stale  # b writes x, so write_overlap when a writes x
        c: stale
      reasons:
        b:
          - type: write_overlap
            loc: "x"
            cell_id: "a"
        c:
          - type: skipped_upstream
            loc: "x"
            cell_id: "a"
            expected_cell_id: "b"
