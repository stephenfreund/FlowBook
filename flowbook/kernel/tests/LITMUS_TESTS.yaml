        post_namespace: {"x": 1, "y": 2}
        reads: []
        writes: ["y"]
      - type: RUN
        cell: "c"
        pre_namespace: {"x": 1, "y": 2}
        post_namespace: {"x": 1, "y": 2, "z": 3}
        reads: []
        writes: ["z"]
      # Move B to end (B has no dependencies with A or C)
      - type: MOVE
        new_order: ["a", "c", "b"]
    expect:
      status:
        a: clean
        b: clean
        c: clean
      cell_order: ["a", "c", "b"]
      newly_stale: []

